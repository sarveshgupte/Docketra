name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_SECRET: "0123456789abcdef0123456789abcdef"
      SUPERADMIN_PASSWORD_HASH: "$2b$10$abcdefghijklmnopqrstuu0Lz3M0RtZpmjHtkobaN6D2PfYZ7RUTy"
      SUPERADMIN_XID: "X000001"
      SUPERADMIN_EMAIL: "superadmin@example.com"
      SUPERADMIN_OBJECT_ID: "000000000000000000000001"
      MONGO_URI: "mongodb://127.0.0.1:27017/docketra"
      REDIS_URL: redis://127.0.0.1:6379
      DISABLE_GOOGLE_AUTH: "true"
      ENCRYPTION_PROVIDER: disabled
      METRICS_TOKEN: test-metrics-token
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - name: Install backend dependencies
        run: npm install

      - name: Install UI dependencies
        run: cd ui && npm install

      - name: Validate environment contract
        run: npm run validate:env

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build UI
        run: npm run build:ui

      - name: Audit backend dependencies
        run: npm audit --audit-level=high

      - name: Audit UI dependencies
        run: cd ui && npm audit --audit-level=high
