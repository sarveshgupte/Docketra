name: CI Release Gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-release-gate:
    name: Backend release gate
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_SECRET: ci-placeholder-jwt-secret-for-tests-only-do-not-use
      SUPERADMIN_XID: X000001
      SUPERADMIN_EMAIL: superadmin@example.com
      # Test-only bcrypt hash placeholder ("password"). Never use in production.
      SUPERADMIN_PASSWORD_HASH: "$2b$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy"
      SUPERADMIN_OBJECT_ID: "000000000000000000000001"
      MONGO_URI: mongodb://127.0.0.1:27017/docketra
      REDIS_URL: redis://127.0.0.1:6379
      DISABLE_GOOGLE_AUTH: "true"
      ENCRYPTION_PROVIDER: disabled
      METRICS_TOKEN: test-metrics-token
      # CI-only placeholder values used exclusively by `validate:env:production`.
      # These are NOT real credentials. Real production values must be configured
      # in Render environment variables or GitHub Actions secrets — never committed.
      # See docs/deployment/ci-env-placeholders.md for details.
      MAIL_FROM: no-reply@example.com
      BREVO_API_KEY: ci-placeholder-brevo-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies (dev included)
        run: npm install --include=dev

      - name: Documentation link validation gate
        run: npm run docs:check

      - name: Backend syntax/lint gate
        run: npm run ci:backend:syntax

      - name: Route schema coverage gate
        run: npm run ci:backend:routes

      - name: Core backend tests gate
        run: npm run ci:backend:core

      - name: Security/config gate
        run: npm run ci:backend:security

      - name: Backend deploy-safety gate
        run: npm run ci:backend:deploy-safety

      - name: Secret scanning gate
        run: npm run security:secrets

  frontend-release-gate:
    name: Frontend release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies (dev included)
        run: npm run ci:frontend:install

      - name: Frontend build gate
        run: npm run ci:frontend:build

      - name: Frontend UI checks gate
        run: npm run ci:frontend:checks
