name: Secret scanning

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify secret scanning contract
        run: npm run test:secret-scanning:contract

      - name: Run secret scanning gate
        run: npm run security:secrets
