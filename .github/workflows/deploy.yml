name: Continuous Deployment

on:
  push:
    branches:
      - main

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy to GCP & Firebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build React Frontend
        run: |
          cd ui
          npm ci
          VITE_API_BASE_URL="https://api.docketra.in/api" \
          VITE_GOOGLE_CLIENT_ID="1078507569854-c24hg50jkar8p68ooumkdebr3qtrcoe5.apps.googleusercontent.com" \
          VITE_SUPPORT_EMAIL="sarveshgupte@gmail.com" \
          VITE_TURNSTILE_SITE_KEY="0x4AAAAAADUM0lvwvSX_G56o" \
          npm run build
          cd ..

      - name: Deploy Frontend to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_DOCKETRA_PROD }}"
          channelId: live
          projectId: docketra-prod

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Deploy Backend to Cloud Run
        run: |
          IMAGE_URI="gcr.io/docketra-prod/docketra-api:${{ github.sha }}"
          
          # Build container using Cloud Build
          gcloud builds submit --project docketra-prod --tag "$IMAGE_URI" --suppress-logs .
          
          # Deploy image to Google Cloud Run (preserving env variables already configured on the service)
          gcloud run deploy docketra-api \
            --project docketra-prod \
            --region us-central1 \
            --image "$IMAGE_URI" \
            --platform managed \
            --allow-unauthenticated

